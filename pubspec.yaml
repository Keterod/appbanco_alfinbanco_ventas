name: banco_alfinbanco_ventas
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  # Backend
  supabase_flutter: ^2.5.0
  # Base de datos local
  sqflite: ^2.3.3
  path: ^1.9.0
  # Navegación
  go_router: ^14.0.0
  # Mapas y ubicación
  google_maps_flutter: ^2.9.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  # Cámara y documentos
  camera: ^0.11.0
  image_picker: ^1.1.2
  image: ^4.2.0
  # Gráficos
  fl_chart: ^0.68.0
  # Notificaciones
  flutter_local_notifications: ^17.2.2
  firebase_messaging: ^15.1.3
  # Firma digital
  signature: ^5.5.0
  # PDF
  pdf: ^3.11.1
  printing: ^5.13.2
  # Utilidades
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  workmanager: ^0.9.0
  flutter_secure_storage: ^9.2.2
  photo_view: ^0.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/alfin_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/alfin_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/alfin_logo.png"
